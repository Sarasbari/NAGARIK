version: "3.8"

services:
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./ml/.env
    volumes:
      - ./ml/routers:/app/routers
      - ./ml/services:/app/services
      - ./ml/models:/app/models
    restart: unless-stopped
    networks:
      - nagarik

  # Supabase local dev — use `npx supabase start` instead for full
  # Supabase stack. This is a minimal Postgres + PostGIS setup.
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nagarik
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - nagarik

volumes:
  pgdata:

networks:
  nagarik:
    driver: bridge
